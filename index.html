<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Add favicon here -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

  <title>Weather app</title>
  
  <!-- Link stylesheet here -->
   <link rel="stylesheet" href="styles.css">

</head>
<body>

  <div class="app-container">

    <header class="header-app">
      <div class="logo">
        <img src="assets/images/logo.svg" alt="">
      </div>

      <div class="units-toggle">
        <button id="units-btn"> <img src="assets/images/icon-units.svg" alt=""> Units <img src="assets/images/icon-dropdown.svg" alt=""></button>
      </div>
    </header>

    <div class="main">

      <section class="search-section">
        <h1>How's is the sky looking today?</h1>
      <form class="search-form">
        <div class="input-group">
          <img src="assets/images/icon-search.svg" alt="" class="search-icon">
          <input type="text" id="search-input" placeholder="Search for a place...">
        </div>
        <button type="submit" class="btn-search">Search</button>
      </form>
      </section>

    </div>

  </div>

</body>

<!-- Link JavaScript file here -->
 
</html>
