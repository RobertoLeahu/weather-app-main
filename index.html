<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Weather app</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="header-app">
        <div class="logo">
          <img class="logo-img" src="assets/images/logo.svg" alt="Logo" />
        </div>

        <div class="units-toggle">
          <button id="units-btn" class="units-btn">
            <img class="units-icon" src="assets/images/icon-units.svg" alt="" />
            Units
            <img
              class="dropdown-icon"
              src="assets/images/icon-dropdown.svg"
              alt=""
            />
          </button>
        </div>
      </header>

      <div class="main">
        <section class="search-section">
          <h1 class="search-title">How's the sky looking today?</h1>
          <form class="search-form">
            <div class="input-group">
              <img
                src="assets/images/icon-search.svg"
                alt=""
                class="search-icon"
              />
              <input
                type="text"
                id="search-input"
                class="search-input-field"
                placeholder="Search for a place..."
              />
            </div>
            <button type="submit" id="search-button" class="btn-search">
              Search
            </button>
          </form>
        </section>

        <div class="dashboard">
          <div class="left-column">
            <section class="current-weather">
              <div class="location-date">
                <h2 class="current-city" id="location">--</h2>
                <p class="current-date" id="date">--</p>
              </div>
              <div class="display-temperatures">
                <img
                  id="current-weather"
                  class="current-weather-icon"
                  src="assets/images/icon-sunny.webp"
                  alt="Sunny"
                />
                <p class="current-temperature-text" id="current-temperature">
                  --
                </p>
              </div>
            </section>

            <section class="metric-weather">
              <div class="metric-card">
                <h3 class="metric-title">Feel like</h3>
                <p id="feel-like" class="metric-value">--</p>
              </div>
              <div class="metric-card">
                <h3 class="metric-title">Humidity</h3>
                <p id="humidity" class="metric-value">--</p>
              </div>
              <div class="metric-card">
                <h3 class="metric-title">Wind</h3>
                <p id="wind" class="metric-value">--</p>
              </div>
              <div class="metric-card">
                <h3 class="metric-title">Precipitation</h3>
                <p id="precipitation" class="metric-value">--</p>
              </div>
            </section>

            <section class="daily-forecast">
              <h3 class="daily-title">Daily Forecast</h3>
              <div class="day-cards-grid">
                <div class="day-card">
                  <h4 class="day-name">--</h4>
                  <img
                    class="day-icon"
                    src="assets/images/icon-sunny.webp"
                    alt=""
                  />
                  <div class="day-card-temperatures">
                    <p class="high">--</p>
                    <p class="low">--</p>
                  </div>
                </div>
                <div class="day-card">
                  <h4 class="day-name">--</h4>
                  <img
                    class="day-icon"
                    src="assets/images/icon-sunny.webp"
                    alt=""
                  />
                  <div class="day-card-temperatures">
                    <p class="high">--</p>
                    <p class="low">--</p>
                  </div>
                </div>
                <div class="day-card">
                  <h4 class="day-name">--</h4>
                  <img
                    class="day-icon"
                    src="assets/images/icon-sunny.webp"
                    alt=""
                  />
                  <div class="day-card-temperatures">
                    <p class="high">--</p>
                    <p class="low">--</p>
                  </div>
                </div>
                <div class="day-card">
                  <h4 class="day-name">--</h4>
                  <img
                    class="day-icon"
                    src="assets/images/icon-sunny.webp"
                    alt=""
                  />
                  <div class="day-card-temperatures">
                    <p class="high">--</p>
                    <p class="low">--</p>
                  </div>
                </div>
                <div class="day-card">
                  <h4 class="day-name">--</h4>
                  <img
                    class="day-icon"
                    src="assets/images/icon-sunny.webp"
                    alt=""
                  />
                  <div class="day-card-temperatures">
                    <p class="high">--</p>
                    <p class="low">--</p>
                  </div>
                </div>
                <div class="day-card">
                  <h4 class="day-name">--</h4>
                  <img
                    class="day-icon"
                    src="assets/images/icon-sunny.webp"
                    alt=""
                  />
                  <div class="day-card-temperatures">
                    <p class="high">--</p>
                    <p class="low">--</p>
                  </div>
                </div>
                <div class="day-card">
                  <h4 class="day-name">--</h4>
                  <img

                    src="assets/images/icon-sunny.webp"
                    alt=""
                  />
                  <div class="day-card-temperatures">
                    <p class="high">--</p>
                    <p class="low">--</p>
                  </div>
                </div>
              </div>
            </section>
          </div>

          <div class="right-column">
            <section class="hourly-forecast">
              <div class="hourly-header">
                <h3 class="hourly-title">Hourly forecast</h3>

                <div class="dropdown-container">
                  <button id="hourly-btn" class="hourly-btn">
                    <span id="hourly-selected-day">--</span>
                    <img
                      class="dropdown-icon"
                      src="assets/images/icon-dropdown.svg"
                      alt=""
                    />
                  </button>
                </div>
              </div>

              <div class="hourly-list">
                <div class="hourly-card">
                  <div class="time-info">
                    <img
                      class="hourly-icon"
                      src="assets/images/icon-sunny.webp"
                      alt=""
                    />
                    <h4 class="hourly-time">--</h4>
                  </div>
                  <div class="temp-info">
                    <p class="high">--</p>
                  </div>
                </div>
                <div class="hourly-card">

                  </div>
                  <div class="temp-info">

                <div class="hourly-card">
                  <div class="time-info">
                    <img

                      src="assets/images/icon-sunny.webp"
                      alt=""
                    />
                    <h4 class="hourly-time">--</h4>
                  </div>
                  <div class="temp-info">
                    <p class="high">--</p>
                  </div>
                </div>
                <div class="hourly-card">
                  <div class="time-info">
                    <img

                    />

                  <div class="temp-info">

                <div class="hourly-card">
                  <div class="time-info">

                    />
                    <h4 class="hourly-time">--</h4>
                  </div>
                  <div class="temp-info">

                </div>
                <div class="hourly-card">
                  <div class="time-info">

                  <div class="temp-info">

                </div>
                <div class="hourly-card">
                  <div class="time-info">
                    <img

                    <h4 class="hourly-time">--</h4>
                  </div>
                  <div class="temp-info">
                    <p class="high">--</p>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
